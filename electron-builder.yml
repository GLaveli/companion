appId: com.redlotus.companion
productName: Project Companion
directories:
  buildResources: build
  output: dist
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml,package-lock.json}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
# node-llama-cpp ships native binaries that must stay unpacked from the asar so
# they can be loaded at runtime. The "models" folder holds the downloaded LLM,
# whisper and TTS assets and is kept outside the asar as well.
asarUnpack:
  - '**/node_modules/node-llama-cpp/**'
  - '**/node_modules/@node-llama-cpp/**'
  - '**/node_modules/nodejs-whisper/**'
  - 'models/**'
extraResources:
  - from: models
    to: models
    filter:
      - '**/*'
win:
  target:
    - nsis
mac:
  target:
    - dmg
  category: public.app-category.productivity
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSMicrophoneUsageDescription: Lotus precisa do microfone para ouvir você falar.
    NSCameraUsageDescription: Lotus usa a câmera para o avatar olhar para você.
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
